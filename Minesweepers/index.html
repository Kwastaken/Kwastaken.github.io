<!doctype html>
<html lang="en" data-ripple="1">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <title>Minesweepers</title>
  </head>
  <body data-ripple="1">
    <h1>Minesweepers</h1>
    <div id="container" class="container" data-ripple="1">
      <div id="info">i</div>
      <div id="htp" class="invis">
        <h2>How to play</h2>
        <ol>
          <li>The goal is to uncover all squares without exploding a mine</li>
          <li>The amount of mines is shown by the flag</li>
          <li>
            Select the flag to mark potential mines(you have a limited amount)
          </li>
          <li>Select the shovel to uncover squares</li>
        </ol>
        <p>&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;Good luck 😉</p>
      </div>
      <div id="game-container" class="container"></div>
      <div id="flag" class="tools flag" data-tool="flag">
        <div id="mines" class=""></div>
      </div>
      <div id="shovel" class="tools" data-tool="shovel"></div>
    </div>
    <div id="button-container" class="button-container invis" data-ripple="2">
      <button id="clear" class="ripple" data-ripple="0">&#x21BA;</button>
    </div>
    <div id="canvas" data-ripple="1"></div>
    <div id="cover" class="invis" data-ripple="2"></div>

    <script>
      let shovel = true;
      let flag = Math.floor(Math.random() * 5) + 10;
      let row = 10;
      let col = 10;
      let boxSeen = [];
      let mines = [];
      document.documentElement.style.setProperty("--col", col);

      function getAdjEnt(crd) {
        //get the squares around the target
        //throw new Error("pfft");
        crd *= 1;
        let tempLoop = [crd - 10, crd + 10];
        if (crd % 10 == 1) {
          tempLoop.push(crd + 1, crd - 9, crd + 11);
        } else if (crd % 10 == 0) {
          tempLoop.push(crd - 1, crd + 9, crd - 11);
        } else {
          tempLoop.push(crd + 1, crd - 9, crd + 11, crd - 1, crd + 9, crd - 11);
        }
        return tempLoop;
      }
      function mineMaker(target, limit, temp) {
        //create mines that arent on or around the target
        mines = getAdjEnt(target);
        temp = new Set(mines);
        temp.add(Number(target));
        while (temp.size < limit + mines.length + 1) {
          temp.add(Math.floor(Math.random() * 100) + 1);
        }
        mines.forEach((e) => {
          temp.delete(e);
        });
        temp.delete(Number(target));
        mines = [];
        mines = Array.from(temp);
        mines.sort((a, b) => a - b);
      }
      function boxColor(e) {
        //color for testing may add it to the numbers later
        switch (e.dataset.numbers) {
          case "-1":
            e.classList.toggle("colorm");
            break;
          case "0":
            e.classList.toggle("color0");
            break;
          case "1":
            e.classList.toggle("color1");
            break;
          case "2":
            e.classList.toggle("color2");
            break;
          case "3":
            e.classList.toggle("color3");
            break;
          case "4":
            e.classList.toggle("color4");
            break;
          case "5":
            e.classList.toggle("color5");
            break;
          case "6":
            e.classList.toggle("color6");
            break;
          case "7":
            e.classList.toggle("color7");
            break;
          case "8":
            e.classList.toggle("color8");
            break;
        }
      }
      function boxNumbers(e) {
        //Gives the html element data about how many mines around
        if (mines.includes(Number(e.dataset.coords))) {
          e.dataset.numbers = -1;
        }
        if (e.dataset.numbers != -1) {
          e.dataset.numbers = getAdjEnt(e.dataset.coords).filter((e) =>
            mines.includes(e),
          ).length;
        }
      }
      function game(e) {
        //main game
        if (
          boxSeen.includes(e.dataset.coords) ||
          (shovel && e.dataset.flag == 1)
        ) {
          return;
        }
        if (!shovel && !boxSeen.includes(e.dataset.coords)) {
          if (e.dataset.flag == 0 && flag > 0) {
            e.classList.add("flag");
            e.dataset.flag = 1;
            flag--;
            document.querySelector("#mines").innerText = flag;
          } else if (e.dataset.flag == 1) {
            e.classList.remove("flag");
            e.dataset.flag = 0;
            flag++;
            document.querySelector("#mines").innerText = flag;
          }
          return;
        }
        if (e.dataset.numbers == -1 && e.dataset.flag == 0) {
          e.classList.add("explode");
          document.querySelector("#cover").classList.remove("invis");
          document.querySelector("#button-container").classList.remove("invis");
          document.querySelector("#button-container").childNodes[0].nodeValue =
            "YOU LOSE";
          return;
        }
        //loop to uncover blank squares quickly
        let blanksTBC = [e.dataset.coords];
        while (blanksTBC.length > 0) {
          if (document.querySelector("#c" + blanksTBC[0]).dataset.flag == 1) {
            blanksTBC.shift();
            continue;
          }
          if (document.querySelector("#c" + blanksTBC[0]).dataset.numbers > 0) {
            document.querySelector("#c" + blanksTBC[0]).classList.add("dug");
            document.querySelector("#c" + blanksTBC[0]).innerText =
              document.querySelector("#c" + blanksTBC[0]).dataset.numbers;
            boxSeen.push(blanksTBC[0]);
            blanksTBC.shift();
            continue;
          }
          let tempLoop = getAdjEnt(blanksTBC[0]);
          tempLoop.forEach((e) => {
            if (
              !blanksTBC.includes(e.toString()) &&
              !boxSeen.includes(e.toString()) &&
              e > 0 &&
              e < 101
            ) {
              blanksTBC.push(e.toString());
            }
          });
          document.querySelector("#c" + blanksTBC[0]).classList.add("dug");
          boxSeen.push(blanksTBC[0]);
          blanksTBC.shift();
        }
        if (boxSeen.length == 100 - mines.length) {
          document.querySelector("#cover").classList.remove("invis");
          document.querySelector("#button-container").classList.remove("invis");
          document.querySelector("#button-container").childNodes[0].nodeValue =
            "YOU WIN";
        }
      }
      function newGame() {
        //restart game
        let mineBox = document.querySelectorAll(".mineBox");
        mineBox.forEach((e) => {
          e.dataset.flag = e.dataset.numbers = 0;
          e.classList.remove("dug", "flag", "explode");
          e.innerText = "";
        });
        boxSeen = mines = [];
        shovel = true;
        flag = Math.floor(Math.random() * 5) + 10;
        document.querySelector("#mines").innerText = flag;
        document.querySelector("#cover").classList.add("invis");
        document.querySelector("#button-container").classList.add("invis");
      }

      document.addEventListener("DOMContentLoaded", () => {
        // on load fill container
        document.documentElement.style.setProperty(
          "--width",
          window.innerWidth / window.innerHeight < 0.795
            ? "7.71vmin"
            : "5.2vmin",
        );
        for (let i = 1; i <= row * col; i++) {
          let divCreator = document.createElement("div");
          divCreator.className = "mineBox";
          divCreator.id = "c" + i;
          divCreator.dataset.coords = i;
          divCreator.dataset.flag = divCreator.dataset.numbers = 0;
          document.querySelector("#game-container").appendChild(divCreator);
        }
        //on load game container
        document
          .querySelector("#mines")
          .appendChild(document.createTextNode(flag));
        let mineBox = document.querySelectorAll(".mineBox");
        mineBox.forEach((e) => {
          e.addEventListener("click", (e) => {
            if (boxSeen.length == 0 && shovel) {
              mineMaker(e.target.dataset.coords, flag);
              for (let i = 1; i <= row * col; i++) {
                boxNumbers(document.querySelector("#c" + i));
              }
            }
            game(e.target);
          });
          //fancy effect on holding the screen
          let prevBoxAt = document.querySelector("#cover");
          e.addEventListener("touchstart", (e) => {
            prevBoxAt = document.elementFromPoint(
              e.touches[0].clientX,
              e.touches[0].clientY,
            );
            prevBoxAt.classList.add("mineBoxTouch");
          });
          e.addEventListener("touchmove", (e) => {
            let boxAt = document.elementFromPoint(
              e.touches[0].clientX,
              e.touches[0].clientY,
            );
            if (
              boxAt.parentElement != document.getElementById("game-container")
            ) {
              prevBoxAt.classList.remove("mineBoxTouch");
              prevBoxAt = document.querySelector("#cover");
              return;
            } else if (prevBoxAt.id != boxAt.id) {
              boxAt.classList.toggle("mineBoxTouch");
              prevBoxAt.classList.toggle("mineBoxTouch");
              prevBoxAt = boxAt;
            }
          });
          e.addEventListener("touchend", (e) => {
            prevBoxAt.classList.remove("mineBoxTouch");
          });
        });
        //on load game tools
        let tools = document.querySelectorAll(".tools");
        tools.forEach((e) => {
          e.addEventListener("click", (e) => {
            if (e.target.dataset.tool != "shovel") {
              shovel = false;
              document.querySelector('[data-tool="flag"]').style.borderStyle =
                "ridge";
              document.querySelector('[data-tool="shovel"]').style.borderStyle =
                "solid";
            } else {
              shovel = true;
              document.querySelector('[data-tool="shovel"]').style.borderStyle =
                "ridge";
              document.querySelector('[data-tool="flag"]').style.borderStyle =
                "solid";
            }
          });
        });
        //Clear button
        document.querySelector("#clear").addEventListener("click", newGame);
        //Info popup
        const info = () => {
          document.querySelector("#htp").classList.remove("invis");
          setTimeout(() => {
            document.addEventListener(
              "click",
              () => {
                document.querySelector("#htp").classList.add("invis");
                document
                  .querySelector("#info")
                  .addEventListener("click", info, { once: true });
              },
              { once: true },
            );
          }, 0.1);
        };
        document
          .querySelector("#info")
          .addEventListener("click", info, { once: true });
        //responsiveness
        window.addEventListener("resize", () => {
          if (window.innerWidth / window.innerHeight < 0.795) {
            document.documentElement.style.setProperty("--width", "7.71vmin");
            document.documentElement.style.setProperty("--height", "7.71vmin");
          } else {
            document.documentElement.style.setProperty("--width", "5.2vmin");
            document.documentElement.style.setProperty("--height", "5.2vmin");
          }
        });
        document.addEventListener("click", (e) => {
          let efp = document
            .elementsFromPoint(e.clientX, e.clientY)
            .filter((e) => !e.classList.contains("ripple"));
          //console.log(efp);
          if (efp[0].dataset.ripple) {
            let divCreator = document.createElement("div");
            divCreator.style.left = e.clientX + "px";
            divCreator.style.top = e.clientY + "px";
            divCreator.className = "ripples ripple";
            divCreator.dataset.ripple = "1";
            setTimeout(() => {
              divCreator.style.setProperty("height", "200vmax");
            }, 0.1);
            setTimeout(() => {
              divCreator.classList.remove("white-ripple");
              divCreator.remove();
            }, 5000);
            if (!efp.includes(document.querySelector("#cover"))) {
              document.querySelector("#canvas").appendChild(divCreator);
            } else {
              if (shovel) {
                let posData = efp[2].getBoundingClientRect();
                divCreator.style.left = posData.x + posData.height / 2 + "px";
                divCreator.style.top = posData.y + posData.height / 2 + "px";
                shovel = false;
              }
              divCreator.classList.add("white-ripple");
              document.querySelector("#cover").appendChild(divCreator);
            }
          }
        });
      });
    </script>
  </body>
</html>
